syntax = "proto3";

option java_package = "io.tryrook.rook_sdk_samsung_health.proto";
option java_outer_classname = "ProtobufModels";
option java_multiple_files = true;

message PluginExceptionProto {
  sint32 id = 1;
  sint32 code = 2;
  string message = 3;
}

message BooleanResultProto {
  oneof result {
    bool success = 1;
    PluginExceptionProto failure = 2;
  }
}

message Int64ResultProto {
  oneof result {
    int64 success = 1;
    PluginExceptionProto failure = 2;
  }
}

enum EnvironmentProto {
  SANDBOX = 0;
  PRODUCTION = 1;
}

message ConfigurationProto {
  string clientUUID = 1;
  string secretKey = 2;
  EnvironmentProto environment = 3;
  bool enableBackgroundSync = 4;
}

enum SamsungHealthAvailabilityProto {
  INSTALLED = 0;
  NOT_INSTALLED = 1;
  OUTDATED = 2;
  DISABLED = 3;
  NOT_READY = 4;
}

enum RequestPermissionsStatusProto {
  REQUEST_SENT = 0;
  ALREADY_GRANTED = 1;
}

message RequestPermissionsStatusResultProto {
  oneof result {
    RequestPermissionsStatusProto success = 1;
    PluginExceptionProto failure = 2;
  }
}

enum SamsungHealthPermissionProto {
  ACTIVITY_SUMMARY_PERMISSION = 0;
  BLOOD_GLUCOSE_PERMISSION = 1;
  BLOOD_OXYGEN_PERMISSION = 2;
  BLOOD_PRESSURE_PERMISSION = 3;
  BODY_COMPOSITION_PERMISSION = 4;
  EXERCISE_PERMISSION = 5;
  EXERCISE_LOCATION_PERMISSION = 6;
  FLOORS_CLIMBED_PERMISSION = 7;
  HEART_RATE_PERMISSION = 8;
  NUTRITION_PERMISSION = 9;
  SLEEP_PERMISSION = 10;
  STEPS_PERMISSION = 11;
  WATER_INTAKE_PERMISSION = 12;
}

message SamsungHealthPermissionsSummaryProto {
  bool dataTypesGranted = 1;
  bool dataTypesPartiallyGranted = 2;
}

enum SummarySyncTypeProto {
  SLEEP = 0;
  PHYSICAL = 1;
  BODY = 2;
}

enum EventSyncTypeProto {
  ACTIVITY = 0;
  BLOOD_GLUCOSE = 1;
  BLOOD_PRESSURE = 2;
  BODY_METRICS = 3;
  HEART_RATE = 4;
  HYDRATION = 5;
  NUTRITION = 6;
  OXYGENATION = 7;
  STEPS = 8;
  CALORIES = 9;
}

enum SyncStatusProto {
  SYNCED = 0;
  RECORDS_NOT_FOUND = 1;
}

message SyncStatusResultProto {
  oneof result {
    SyncStatusProto success = 1;
    PluginExceptionProto failure = 2;
  }
}

message SyncStatusWithIntProto {
  SyncStatusProto syncStatus = 1;
  uint32 value = 2;
}

message SyncStatusWithIntResultProto {
  oneof result {
    SyncStatusWithIntProto success = 1;
    PluginExceptionProto failure = 2;
  }
}

message CaloriesProto {
  double basal = 1;
  double active = 2;
}

message SyncStatusWithCaloriesProto {
  SyncStatusProto syncStatus = 1;
  CaloriesProto calories = 2;
}

message SyncStatusWithCaloriesResultProto {
  oneof result {
    SyncStatusWithCaloriesProto success = 1;
    PluginExceptionProto failure = 2;
  }
}
