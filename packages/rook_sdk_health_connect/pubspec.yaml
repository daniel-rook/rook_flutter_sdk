name: rook_sdk_health_connect
description: This package enables apps to extract and upload data from Health Connect.
version: 4.1.0
homepage: 'https://docs.tryrook.io/'
platforms:
  android:

environment:
  sdk: ">=3.10.4 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ">=2.0.0 <3.0.0"
  protobuf: ">=4.1.0 <5.0.0"
  fixnum: "^1.0.0"
  rook_sdk_core: "^4.1.0"

#dependency_overrides:
#  rook_sdk_core:
#    path: "packages/rook_sdk_core"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.rookmotion.rook_sdk_health_connect
        pluginClass: RookSdkHealthConnectPlugin
