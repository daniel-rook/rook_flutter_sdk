  sint32 hrMinimumBpm = 38;
  sint32 hrAvgBpm = 39;
  sint32 hrRestingBpm = 40;
  repeated HrGranularDataProto hrGranularData = 41;
  double hrvAvgRmssd = 42;
  double hrvAvgSdnn = 43;
  repeated HrvSdnnGranularDataProto hrvSdnnGranularData = 44;
  repeated HrvRmssdGranularDataProto hrvRmssdGranularData = 45;
  double saturationAvgPercentage = 46;
  repeated SaturationGranularDataProto saturationGranularData = 47;
  double vo2MaxMlPerMinPerKg = 48;
  repeated Vo2GranularDataProto vo2GranularData = 49;
  sint32 stressAtRestDurationSeconds = 50;
  sint32 stressDurationSeconds = 51;
  sint32 lowStressDurationSeconds = 52;
  sint32 mediumStressDurationSeconds = 53;
  sint32 highStressDurationSeconds = 54;
  repeated StressGranularDataProto stressGranularData = 55;
  sint32 stressAvgLevel = 56;
