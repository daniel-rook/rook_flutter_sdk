  sint32 steps = 16;
  repeated StepsGranularDataProto stepsGranularData = 17;
  sint32 activeSteps = 18;
  repeated ActiveStepsGranularDataProto activeStepsGranularData = 19;
  double walkedDistanceMeters = 20;
  double traveledDistanceMeters = 21;
  repeated TraveledDistanceGranularDataProto traveledDistanceGranularData = 22;
