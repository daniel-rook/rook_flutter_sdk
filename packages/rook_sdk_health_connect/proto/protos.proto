syntax = "proto3";

option java_package = "com.rookmotion.rook_sdk_health_connect.proto";
option java_outer_classname = "ProtobufModels";
option java_multiple_files = true;

message SDKExceptionProto {
  sint32 code = 1;
  string message = 2;
}

message BooleanResultProto {
  oneof result {
    bool success = 1;
    SDKExceptionProto failure = 2;
  }
}

message Int64ResultProto {
  oneof result {
    int64 success = 1;
    SDKExceptionProto failure = 2;
  }
}

enum EnvironmentProto {
  SANDBOX = 0;
  PRODUCTION = 1;
}

message ConfigurationProto {
  string clientUUID = 1;
  string sha = 2;
  EnvironmentProto environment = 3;
  bool enableBackgroundSync = 4;
}

enum DiagnosticStatePermissionsProto {
  NOT_REQUESTED = 0;
  REQUESTED = 1;
  GRANTED = 2;
}

message DiagnosticSyncStateProto {
  bool enabled = 1;
  string lastSync = 2;
}

message DiagnosticStateProto {
  bool isConfigured = 1;
  bool userIdentified = 2;
  DiagnosticStatePermissionsProto permissions = 3;
  DiagnosticSyncStateProto backgroundSync = 4;
  DiagnosticSyncStateProto manualSync = 5;
}

message DiagnosticStateResultProto {
  oneof result {
    DiagnosticStateProto success = 1;
    SDKExceptionProto failure = 2;
  }
}

enum HealthConnectAvailabilityProto {
  INSTALLED = 0;
  NOT_INSTALLED = 1;
  NOT_SUPPORTED = 2;
}

enum RequestPermissionsStatusProto {
  REQUEST_SENT = 0;
  ALREADY_GRANTED = 1;
}

message RequestPermissionsStatusResultProto {
  oneof result {
    RequestPermissionsStatusProto success = 1;
    SDKExceptionProto failure = 2;
  }
}

enum BackgroundReadStatusProto {
  UNAVAILABLE = 0;
  PERMISSION_NOT_GRANTED = 1;
  PERMISSION_GRANTED = 2;
}

message BackgroundReadStatusResultProto {
  oneof result {
    BackgroundReadStatusProto success = 1;
    SDKExceptionProto failure = 2;
  }
}

message HealthConnectPermissionsSummaryProto {
  bool dataTypesGranted = 1;
  bool dataTypesPartiallyGranted = 2;
  bool backgroundReadGranted = 3;
}

message AndroidPermissionsSummaryProto {
  bool permissionsGranted = 1;
  bool dialogDisplayed = 2;
}

enum SummarySyncTypeProto {
  SLEEP = 0;
  PHYSICAL = 1;
  BODY = 2;
}

enum EventSyncTypeProto {
  ACTIVITY = 0;
  BLOOD_GLUCOSE = 1;
  BLOOD_PRESSURE = 2;
  BODY_METRICS = 3;
  HEART_RATE = 4;
  HYDRATION = 5;
  NUTRITION = 6;
  OXYGENATION = 7;
  TEMPERATURE = 8;
  STEPS = 9;
  CALORIES = 10;
}

message CaloriesProto {
  double basal = 1;
  double active = 2;
}

message CaloriesResultProto {
  oneof result {
    CaloriesProto success = 1;
    SDKExceptionProto failure = 2;
  }
}

message HearRateProto {
  sint32 hrMaximumBpm = 1;
  sint32 hrMinimumBpm = 2;
  sint32 hrAvgBpm = 3;
  sint32 hrRestingBpm = 4;
  repeated HrGranularDataProto hrGranularData = 5;
  double hrvAvgRmssd = 6;
  double hrvAvgSdnn = 7;
  repeated HrvSdnnGranularDataProto hrvSdnnGranularData = 8;
  repeated HrvRmssdGranularDataProto hrvRmssdGranularData = 9;
}

message HearRateResultProto {
  oneof result {
    HearRateProto success = 1;
    SDKExceptionProto failure = 2;
  }
}

// DATA STRUCTURES

message SleepSummaryProto {
  string dateTime = 1;
  string sourceOfData = 2;
  bool wasTheUserUnderPhysicalActivity = 3;
  string sleepStartDateTime = 4;
  string sleepEndDateTime = 5;
  string sleepDate = 6;
  sint32 sleepDurationSeconds = 7;
  sint32 timeInBedSeconds = 8;
  sint32 lightSleepDurationSeconds = 9;
  sint32 remSleepDurationSeconds = 10;
  sint32 deepSleepDurationSeconds = 11;
  sint32 timeToFallAsleepSeconds = 12;
  sint32 timeAwakeDuringSleepSeconds = 13;
  sint32 sleepQualityRating1To5Score = 14;
  sint32 sleepEfficiency1To100Score = 15;
  sint32 sleepGoalSeconds = 16;
  sint32 sleepContinuity1To5Score = 17;
  sint32 sleepContinuity1To5Rating = 18;
  sint32 hrMaximumBpm = 19;
  sint32 hrMinimumBpm = 20;
  sint32 hrAvgBpm = 21;
  sint32 hrRestingBpm = 22;
  sint32 hrBasalBpm = 23;
  repeated HrGranularDataProto hrGranularData = 24;
  double hrvAvgRmssd = 25;
  double hrvAvgSdnn = 26;
  repeated HrvSdnnGranularDataProto hrvSdnnGranularData = 27;
  repeated HrvRmssdGranularDataProto hrvRmssdGranularData = 28;
  repeated TemperatureObjectProto temperatureMinimum = 29;
  repeated TemperatureObjectProto temperatureAvg = 30;
  repeated TemperatureObjectProto temperatureMaximum = 31;
  repeated TemperatureGranularDataProto temperatureGranularData = 32;
  repeated TemperatureObjectProto temperatureDelta = 33;
  double breathsMinimumPerMin = 34;
  double breathsAvgPerMin = 35;
  double breathsMaximumPerMin = 36;
  repeated BreathingGranularDataProto breathingGranularData = 37;
  sint32 snoringEventsCount = 38;
  sint32 snoringDurationTotalSeconds = 39;
  repeated SnoringGranularDataProto snoringGranularData = 40;
  double saturationAvgPercentage = 41;
  double saturationMinimumPercentage = 42;
  double saturationMaximumPercentage = 43;
  repeated SaturationGranularDataProto saturationGranularData = 44;
}

message SleepSummariesProto {
  repeated SleepSummaryProto elements = 1;
}

message SleepSummaryResultProto {
  oneof result {
    SleepSummariesProto success = 1;
    SDKExceptionProto failure = 2;
  }
}

