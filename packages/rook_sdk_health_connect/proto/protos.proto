message BloodPressureObjectProto {
  double systolicMmHg = 1;
  double diastolicMmHg = 2;
}

message PositionObjectProto {
  double latDeg = 1;
  double lngDeg = 2;
}

message TemperatureObjectProto {
  double temperatureCelsius = 1;
  string measurementType = 2;
}

message VelocityObjectProto {
  double speedMetersPerSecond = 1;
  string direction = 2;
}
