message ActivityEventsProto {
  repeated ActivityEventProto elements = 1;
}

message ActivityEventResultProto {
  oneof result {
    ActivityEventsProto success = 1;
    SDKExceptionProto failure = 2;
  }
}

message ActiveStepsGranularDataProto {
  string dateTime = 1;
  sint32 intervalDurationSeconds = 2;
  sint32 activeSteps = 3;
}

message ActivityLevelGranularDataProto {
  string dateTime = 1;
  sint32 activityLevel = 2;
}

message BloodGlucoseGranularDataProto {
  string dateTime = 1;
  double bloodGlucoseMgPerDl = 2;
}

message BloodPressureGranularDataProto {
  string dateTime = 1;
  double systolicMmHg = 2;
  double diastolicMmHg = 3;
}

message BreathingGranularDataProto {
  string dateTime = 1;
  double breathsPerMin = 2;
}

message CadenceGranularDataProto {
  string dateTime = 1;
  sint32 intervalDurationSeconds = 2;
  double cadenceRpm = 3;
}

message ElevationGranularDataProto {
  string dateTime = 1;
  sint32 intervalDurationSeconds = 2;
  double elevationChangeMeters = 3;
