syntax = "proto3";

option java_package = "com.rookmotion.rook_sdk_health_connect.proto";
option java_outer_classname = "ProtobufModels";
option java_multiple_files = true;

message PluginExceptionProto {
  sint32 id = 1;
  sint32 code = 2;
  string message = 3;
}

message BooleanResultProto {
  oneof result {
    bool success = 1;
    PluginExceptionProto failure = 2;
  }
}

message Int64ResultProto {
  oneof result {
    int64 success = 1;
    PluginExceptionProto failure = 2;
  }
}

enum EnvironmentProto {
  SANDBOX = 0;
  PRODUCTION = 1;
}

message ConfigurationProto {
  string clientUUID = 1;
  string secretKey = 2;
  EnvironmentProto environment = 3;
  bool enableBackgroundSync = 4;
}

enum HealthConnectAvailabilityProto {
  INSTALLED = 0;
  NOT_INSTALLED = 1;
  NOT_SUPPORTED = 2;
}

enum RequestPermissionsStatusProto {
  REQUEST_SENT = 0;
  ALREADY_GRANTED = 1;
}

message RequestPermissionsStatusResultProto {
  oneof result {
    RequestPermissionsStatusProto success = 1;
    PluginExceptionProto failure = 2;
  }
}

enum BackgroundReadStatusProto {
  UNAVAILABLE = 0;
  PERMISSION_NOT_GRANTED = 1;
  PERMISSION_GRANTED = 2;
}

message BackgroundReadStatusResultProto {
  oneof result {
    BackgroundReadStatusProto success = 1;
    PluginExceptionProto failure = 2;
  }
}

message HealthConnectPermissionsSummaryProto {
  bool dataTypesGranted = 1;
  bool dataTypesPartiallyGranted = 2;
  bool backgroundReadGranted = 3;
}

message AndroidPermissionsSummaryProto {
  bool permissionsGranted = 1;
  bool dialogDisplayed = 2;
}

enum SummarySyncTypeProto {
  SLEEP = 0;
  PHYSICAL = 1;
  BODY = 2;
}

enum EventSyncTypeProto {
  ACTIVITY = 0;
  BLOOD_GLUCOSE = 1;
  BLOOD_PRESSURE = 2;
  BODY_METRICS = 3;
  HEART_RATE = 4;
  HYDRATION = 5;
  NUTRITION = 6;
  OXYGENATION = 7;
  TEMPERATURE = 8;
  STEPS = 9;
  CALORIES = 10;
}

enum SyncStatusProto {
  SYNCED = 0;
  RECORDS_NOT_FOUND = 1;
}

message SyncStatusResultProto {
  oneof result {
    SyncStatusProto success = 1;
    PluginExceptionProto failure = 2;
  }
}

message SyncStatusWithIntProto {
  SyncStatusProto syncStatus = 1;
  uint32 value = 2;
}

message SyncStatusWithIntResultProto {
  oneof result {
    SyncStatusWithIntProto success = 1;
    PluginExceptionProto failure = 2;
  }
}

message CaloriesProto {
  double basal = 1;
  double active = 2;
}

message SyncStatusWithCaloriesProto {
  SyncStatusProto syncStatus = 1;
  CaloriesProto calories = 2;
}

message SyncStatusWithCaloriesResultProto {
  oneof result {
    SyncStatusWithCaloriesProto success = 1;
    PluginExceptionProto failure = 2;
  }
}

enum DataSourceTypeProto {
  GARMIN = 0;
  OURA = 1;
  POLAR = 2;
  FITBIT = 3;
  WITHINGS = 4;
  WHOOP = 5;
}

message DataSourceAuthorizerProto {
  string dataSource = 1;
  bool authorized = 2;
  string authorizationUrl = 3;
  bool authorizationUrlIsNull = 6;
}

message DataSourceAuthorizerResultProto {
  oneof result {
    DataSourceAuthorizerProto success = 1;
    PluginExceptionProto failure = 2;
  }
}

message AuthorizedDataSourcesProto {
  uint32 oura = 1;
  uint32 polar = 2;
  uint32 whoop = 3;
  uint32 fitbit = 4;
  uint32 garmin = 5;
  uint32 withings = 6;
  uint32 dexcom = 7;
  uint32 appleHealth = 8;
  uint32 healthConnect = 9;
  uint32 android = 10;
}

message AuthorizedDataSourcesResultProto {
  oneof result {
    AuthorizedDataSourcesProto success = 1;
    PluginExceptionProto failure = 2;
  }
}

message AuthorizedDataSourceV2Proto {
  string name = 1;
  bool authorized = 2;
  string imageUrl = 3;
}

message AuthorizedDataSourceV2ListProto {
  repeated AuthorizedDataSourceV2Proto list = 1;
}

message AuthorizedDataSourceV2ResultProto {
  oneof result {
    AuthorizedDataSourceV2ListProto success = 1;
    PluginExceptionProto failure = 2;
  }
}

// DEPRECATED

message DataSourceProto {
  string name = 1;
  string description = 2;
  string imageUrl = 3;
  bool connected = 4;
  string authorizationUrl = 5;
  bool authorizationUrlIsNull = 6;
}

message DataSourcesProtoListWrapper {
  repeated DataSourceProto dataSources = 1;
}

message ResultDataSourcesProto {
  oneof result {
    DataSourcesProtoListWrapper dataSourcesProtoListWrapper = 1;
    PluginExceptionProto pluginExceptionProto = 2;
  }
}
