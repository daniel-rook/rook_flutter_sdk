syntax = "proto3";

message PluginExceptionProto {
  sint32 id = 1;
  sint32 code = 2;
  string message = 3;
}

message BooleanResultProto {
  oneof result {
    bool success = 1;
    PluginExceptionProto failure = 2;
  }
}

message Int64ResultProto {
  oneof result {
    int64 success = 1;
    PluginExceptionProto failure = 2;
  }
}

enum EnvironmentProto {
  SANDBOX = 0;
  PRODUCTION = 1;
}

message ConfigurationProto {
  string clientUUID = 1;
  string secretKey = 2;
  EnvironmentProto environment = 3;
  bool enableBackgroundSync = 4;
}

enum AppleHealthPermissionProto {
  APPLE_EXERCISE_TIME = 0;
  APPLE_MOVE_TIME = 1;
  APPLE_STAND_TIME = 2;
  BASAL_ENERGY_BURNED = 3;
  ACTIVE_ENERGY_BURNED = 4;
  STEP_COUNT = 5;
  DISTANCE_CYCLING = 6;
  DISTANCE_WALKING_RUNNING = 7;
  DISTANCE_SWIMMING = 8;
  SWIMMING_STROKE_COUNT = 9;
  FLIGHTS_CLIMBED = 10;
  WALKING_SPEED = 11;
  WALKING_STEP_LENGTH = 12;
  RUNNING_POWER = 13;
  RUNNING_SPEED = 14;
  HEIGHT = 15;
  BODY_MASS = 16;
  BODY_MASS_INDEX = 17;
  WAIST_CIRCUMFERENCE = 18;
  BODY_FAT_PERCENTAGE = 19;
  BODY_TEMPERATURE = 20;
  BASAL_BODY_TEMPERATURE = 21;
  APPLE_SLEEPING_WRIST_TEMPERATURE = 22;
  HEART_RATE_APPLE = 23;
  RESTING_HEART_RATE = 24;
  WALKING_HEART_RATE_AVERAGE = 25;
  HEART_RATE_VARIABILITY_SDNN = 26;
  ELECTROCARDIOGRAM = 27;
  WORKOUT = 28;
  SLEEP_ANALYSIS = 29;
  SLEEP_APNEA_EVENT = 30;
  VO_2_MAX = 31;
  OXYGEN_SATURATION = 32;
  RESPIRATORY_RATE = 33;
  UV_EXPOSURE = 34;
  BIOLOGICAL_SEX = 35;
  DATE_OF_BIRTH = 36;
  BLOOD_PRESSURE_SYSTOLIC = 37;
  BLOOD_PRESSURE_DIASTOLIC = 38;
  BLOOD_GLUCOSE_APPLE = 39;
  DIETARY_ENERGY_CONSUMED = 40;
  DIETARY_PROTEIN = 41;
  DIETARY_SUGAR = 42;
  DIETARY_FAT_TOTAL = 43;
  DIETARY_CARBOHYDRATES = 44;
  DIETARY_FIBER = 45;
  DIETARY_SODIUM = 46;
  DIETARY_CHOLESTEROL = 47;
}

enum SummarySyncTypeProto {
  SLEEP = 0;
  PHYSICAL = 1;
  BODY = 2;
}

enum EventSyncTypeProto {
  reserved 5, 6, 9, 10;

  ACTIVITY = 0;
  BLOOD_GLUCOSE = 1;
  BLOOD_PRESSURE = 2;
  BODY_METRICS = 3;
  HEART_RATE = 4;
  OXYGENATION = 7;
  TEMPERATURE = 8;
}

message SyncStatusWithIntResultProto {
  oneof result {
    uint32 success = 1;
    PluginExceptionProto failure = 2;
  }
}

message CaloriesProto {
  double basal = 1;
  double active = 2;
}

message SyncStatusWithCaloriesResultProto {
  oneof result {
    CaloriesProto success = 1;
    PluginExceptionProto failure = 2;
  }
}

enum DataSourceTypeProto {
  GARMIN = 0;
  OURA = 1;
  POLAR = 2;
  FITBIT = 3;
  WITHINGS = 4;
  WHOOP = 5;
}

message DataSourceAuthorizerProto {
  string dataSource = 1;
  bool authorized = 2;
  string authorizationUrl = 3;
  bool authorizationUrlIsNull = 6;
}

message DataSourceAuthorizerResultProto {
  oneof result {
    DataSourceAuthorizerProto success = 1;
    PluginExceptionProto failure = 2;
  }
}

message AuthorizedDataSourcesProto {
  uint32 oura = 1;
  uint32 polar = 2;
  uint32 whoop = 3;
  uint32 fitbit = 4;
  uint32 garmin = 5;
  uint32 withings = 6;
  uint32 dexcom = 7;
  uint32 appleHealth = 8;
  uint32 healthConnect = 9;
  uint32 android = 10;
}

message AuthorizedDataSourcesResultProto {
  oneof result {
    AuthorizedDataSourcesProto success = 1;
    PluginExceptionProto failure = 2;
  }
}

message AuthorizedDataSourceV2Proto {
  string name = 1;
  bool authorized = 2;
  string imageUrl = 3;
}

message AuthorizedDataSourceV2ListProto {
  repeated AuthorizedDataSourceV2Proto list = 1;
}

message AuthorizedDataSourceV2ResultProto {
  oneof result {
    AuthorizedDataSourceV2ListProto success = 1;
    PluginExceptionProto failure = 2;
  }
}

// DEPRECATED

message DataSourceProto {
  string name = 1;
  string description = 2;
  string imageUrl = 3;
  bool connected = 4;
  string authorizationUrl = 5;
  bool authorizationUrlIsNull = 6;
}

message DataSourcesProtoListWrapper {
  repeated DataSourceProto dataSources = 1;
}

message ResultDataSourcesProto {
  oneof result {
    DataSourcesProtoListWrapper dataSourcesProtoListWrapper = 1;
    PluginExceptionProto pluginExceptionProto = 2;
  }
}
